name: pages
on:
  push:
    branches: [main]
    paths:
      - "data/**"
      - "docs/**"
      - "manifest.webmanifest"
      - "CNAME"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Assemble site
        run: |
          mkdir -p _site
          cp -r data _site/data
          cp -r docs/* _site/ 2>/dev/null || true
          cp manifest.webmanifest _site/ 2>/dev/null || true
          cp CNAME _site/ 2>/dev/null || true
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deploy
        uses: actions/deploy-pages@v4
